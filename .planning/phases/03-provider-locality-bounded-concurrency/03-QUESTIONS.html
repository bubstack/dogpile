              "description": "(1) All provider-side work (PROVIDER-01..03). (2) All coordinator-side work (CONCURRENCY-01..02 + array-parser). Coarser but reflects how the code actually splits between `providers/` and `runtime/`."
            },
            {
              "id": "d",
              "label": "Four plans — split the array-parser unlock into its own plan",
              "description": "(1) Locality. (2) Array-parser unlock. (3) Bounded dispatch. (4) Local clamping. Highest granularity; most files touched per merge but each plan stays surgical."
            }
          ],
          "answer": null,
          "chat_more": "",
          "status": "unanswered"
        }
      ]
    },
    {
      "id": "forward-compat",
      "title": "Forward-Compat & Cross-Cutting",
      "questions": [
        {
          "id": "Q-17",
          "title": "Phase 4 streaming forward-compat — anything to plumb in Phase 3?",
          "context": "Phase 4 (STREAM-01..03) wraps child events with `parentRunId` and per-child `runId` and demuxes interleaved streams. With N concurrent children in Phase 3, interleaving is real. Per-child AbortController already exists from Phase 2 D-07.",
          "options": [
            {
              "id": "a",
              "label": "Nothing — the per-child runId on every event already enables Phase 4 demux",
              "description": "Don't pre-build streaming machinery. Phase 4 reads `runId` from events and that's enough. Lowest scope."
            },
            {
              "id": "b",
              "label": "Pre-allocate per-child stream-handle slot in dispatch result (commented hook)",
              "description": "Leave a structural placeholder so Phase 4's STREAM-03 lands without re-wiring the dispatcher. No runtime code, just a hook + comment."
            },
            {
              "id": "c",
              "label": "Build the per-child stream tap fully in Phase 3",
              "description": "Out of scope for Phase 3 success criteria. Skip unless we're worried Phase 4 will rewrite Phase 3's dispatcher."
            }
          ],
          "answer": null,
          "chat_more": "",
          "status": "unanswered"
        },
        {
          "id": "Q-18",
          "title": "Plan ordering and merge-churn risk",
          "context": "Whichever plan layout we pick (Q-16), some files are touched by every plan: `coordinator.ts`, `types.ts`, `event-schema.test.ts`. Phase 2's experience: dispatchDelegate touched in 02-01/02/03 with surgical diffs and 01→02→03→04 merge order.",
          "options": [
            {
              "id": "a",
              "label": "Locality first, then concurrency, then clamping (a-priori dependency order)",
              "description": "Locality is a pure type/validation addition. Concurrency builds on existing dispatch loop. Clamping consumes both. Most natural; smallest merge surface per plan."
            },
            {
              "id": "b",
              "label": "Concurrency first (unlock array-parser + dispatcher), then locality, then clamping",
              "description": "Front-loads the bigger refactor; locality + clamping land cleanly on top. Larger first plan, smaller follow-ups. Higher early-merge-conflict risk."
            },
            {
              "id": "c",
              "label": "Parallel: locality and concurrency can land in either order; clamping must be last",
              "description": "Acknowledges PROVIDER and CONCURRENCY-01 are independent. Whichever is reviewed first lands first. Lower coordination cost; planner picks at execute time."
            }
          ],
          "answer": null,
          "chat_more": "",
          "status": "unanswered"
        }

    }
  ]
};

let state;
async function loadState() {
  if (initialState && initialState.sections) { state = initialState; return; }
  try {
    const r = await fetch(STATE_PATH);
    state = await r.json();
  } catch (e) {
    state = { phase: "03", sections: [], stats: { total: 0, answered: 0, chat_more: 0, remaining: 0 } };
  }
}

function recomputeStats() {
  let total = 0, answered = 0, chat_more = 0;
  for (const s of state.sections) for (const q of s.questions) {
    total += 1;
    if (q.answer) answered += 1;
    if (q.chat_more && q.chat_more.trim()) chat_more += 1;
  }
  state.stats = { total, answered, chat_more, remaining: total - answered };
  document.getElementById("stat-answered").textContent = answered;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-remaining").textContent = total - answered;
  document.getElementById("stat-chatmore").textContent = chat_more;
  document.getElementById("progress-fill").style.width = total ? (answered / total * 100) + "%" : "0%";
}

function renderQuestion(q) {
  const wrap = document.createElement("div");
  wrap.className = "card" + (q.answer ? " answered" : "");
  wrap.dataset.id = q.id;

  const id = document.createElement("div");
  id.className = "id";
  id.textContent = q.id;
  wrap.appendChild(id);

  const h = document.createElement("h3");
  h.textContent = q.title;
  wrap.appendChild(h);

  if (q.context) {
    const c = document.createElement("div");
    c.className = "ctx";
    c.textContent = q.context;
    wrap.appendChild(c);
  }

  for (const opt of q.options) {
    const lab = document.createElement("label");
    lab.className = "opt";
    const r = document.createElement("input");
    r.type = "radio";
    r.name = q.id;
    r.value = opt.id;
    if (q.answer === opt.id) r.checked = true;
    r.addEventListener("change", () => {
      q.answer = opt.id;
      q.status = "answered";
      wrap.classList.add("answered");
      recomputeStats();
    });
    const body = document.createElement("div");
    const l = document.createElement("div"); l.className = "lbl"; l.textContent = opt.label;
    const d = document.createElement("div"); d.className = "desc"; d.textContent = opt.description;
    body.appendChild(l); body.appendChild(d);
    lab.appendChild(r);
    lab.appendChild(body);
    wrap.appendChild(lab);
  }

  const ta = document.createElement("textarea");
  ta.placeholder = "Add context, nuance, or clarification…";
  ta.value = q.chat_more || "";
  if (ta.value.trim()) ta.classList.add("has-content");
  ta.addEventListener("input", () => {
    q.chat_more = ta.value;
    ta.classList.toggle("has-content", !!ta.value.trim());
    recomputeStats();
  });
  wrap.appendChild(ta);

  return wrap;
}

function renderSection(s) {
  const sec = document.createElement("section");
  const head = document.createElement("div");
  head.className = "section-head";
  const h = document.createElement("h2");
  h.textContent = s.title;
  const cnt = document.createElement("span");
  cnt.className = "count";
  const ansHere = s.questions.filter(q => q.answer).length;
  cnt.textContent = `${ansHere}/${s.questions.length} answered`;
  head.appendChild(h);
  head.appendChild(cnt);
  sec.appendChild(head);

  const grid = document.createElement("div");
  grid.className = "grid";
  for (const q of s.questions) grid.appendChild(renderQuestion(q));
  sec.appendChild(grid);

  head.addEventListener("click", () => grid.style.display = grid.style.display === "none" ? "" : "none");
  return sec;
}

function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";
  for (const s of state.sections) root.appendChild(renderSection(s));

  const banner = document.createElement("div");
  banner.className = "save-banner";
  banner.innerHTML = `When done: click <strong>Download JSON</strong>, replace <code>${STATE_PATH}</code> with the file, then tell Claude <strong>"refresh"</strong> or <strong>"finalize"</strong>.`;
  root.appendChild(banner);

  recomputeStats();
}

function serialize() {
  recomputeStats();
  return JSON.stringify(state, null, 2);
}

document.getElementById("download-json").addEventListener("click", () => {
  const blob = new Blob([serialize()], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "03-QUESTIONS.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("copy-json").addEventListener("click", async () => {
  await navigator.clipboard.writeText(serialize());
  const b = document.getElementById("copy-json");
  const t = b.textContent;
  b.textContent = "Copied!";
  setTimeout(() => b.textContent = t, 1200);
});

(async () => { await loadState(); render(); })();
</script>
